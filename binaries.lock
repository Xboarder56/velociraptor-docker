# Per-asset version pins. Managed by upstream-check.yml.
#
# Each asset records the Velocidex patch version it should be pulled from
# (e.g. v0.76.5) and the expected sha256.
#
# Normally every asset matches VELOX_VERSION in versions.env. When upstream
# hasn't published a given platform for that patch yet, upstream-check walks
# back through earlier patches (still inside the same minor release, or
# earlier minor releases) and pins that asset to the most recent one that
# does have it.
#
# Format: <key>_VERSION=<patch-tag>   <key>_SHA256=<hex>
# Keys: LINUX_AMD64, LINUX_ARM64, DARWIN_AMD64, DARWIN_ARM64, WINDOWS_EXE, WINDOWS_MSI

