# Reference docker-compose for xboarder56/velociraptor.
#
# Copy this file to your deployment directory, then:
#   1. cp .env.example .env  &&  edit .env with your secrets
#   2. docker compose up -d
#
# Settings prefixed with `${...}` in `environment:` come from your `.env`
# (or your shell). Everything is overridable.

services:
  velociraptor:
    # Pin to a specific image for reproducibility. Switch to `:latest`
    # if you'd rather always run the newest build.
    image: xboarder56/velociraptor:0.76.5
    restart: unless-stopped
    stop_grace_period: 30s

    # Container exposes its own HEALTHCHECK against the GUI port; compose
    # surfaces it via `docker compose ps`.

    # Persist config, keys, data, and repacked client bundles.
    volumes:
      - ./velodata:/velociraptor

    ports:
      - "8000:8000"   # Client/Frontend ingest
      - "8889:8889"   # Admin GUI
      - "8001:8001"   # gRPC API
      - "8003:8003"   # Prometheus metrics

    # Optional: pull non-secret defaults from .env automatically. Compose
    # already does ${VAR} interpolation from .env without this; the
    # `env_file:` form additionally injects any vars set there as
    # container env vars even if they aren't referenced below.
    env_file:
      - path: .env
        required: false

    environment:
      # --- Bootstrap admin user (change before exposing publicly) ---
      VELOX_DEFAULT_USER: ${VELOX_DEFAULT_USER:-admin}
      VELOX_DEFAULT_PASSWORD: ${VELOX_DEFAULT_PASSWORD:-changeme}
      VELOX_DEFAULT_USER_ROLE: ${VELOX_DEFAULT_USER_ROLE:-administrator}

      # --- Public URL clients use to reach this server ---
      # For a simple setup, just the hostname is enough.
      VELOX_FRONTEND_HOSTNAME: ${VELOX_FRONTEND_HOSTNAME:-velociraptor.example.com}
      # VELOX_FRONTEND_PORT: 8000
      # VELOX_FRONTEND_SERVER_SCHEME: https

      # --- Public URL for the admin GUI (only set if different from above) ---
      # VELOX_GUI_HOSTNAME: admin.example.com
      # VELOX_GUI_PORT: 8889
      # VELOX_GUI_SCHEME: https

      # --- Full-URL overrides (use for reverse-proxy / split DNS setups) ---
      # VELOX_FRONTEND_SERVER_URL: https://ingest.example.com/
      # VELOX_GUI_URL: https://admin.example.com/app/index.html

      # --- Logging ---
      # `true` enables -v on the server (DEBUG-level). Default is off.
      # VELOX_START_SERVER_VERBOSE: "false"
